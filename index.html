<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>BERLIN Portfolio</title>
    <meta name="description" content="BERLIN Portfolio — A bold and playful graphic designer crafting organized chaos from raw pixels." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="BERLIN Portfolio" />
    <meta property="og:description" content="BERLIN Portfolio — A bold and playful graphic designer crafting organized chaos from raw pixels." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BERLIN Portfolio" />
    <meta name="twitter:description" content="BERLIN Portfolio — A bold and playful graphic designer crafting organized chaos from raw pixels." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="./assets/js/main.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/css/style.css">
    <style>
      /* Contact form - Caveat font for inputs */
      #contact .w-full.bg-transparent.border-b-2.border-gray-300.focus\:border-foreground {
        font-family: 'Caveat', cursive !important;
        font-size: 1.5rem !important;
      }
      
      #contact input.w-full.bg-transparent.border-b-2 {
        font-family: 'Caveat', cursive !important;
      }
      
      #contact textarea.w-full.bg-transparent.border-b-2 {
        font-family: 'Caveat', cursive !important;
      }
      
      /* Message styling */
      .web3form-message {
        padding: 1rem;
        border-radius: 4px;
        display: none;
        margin-top: 1rem;
        font-weight: 600;
        border: 2px solid;
        font-size: 1rem;
      }
      .web3form-message.show {
        display: block;
        animation: slideIn 0.3s ease;
      }
      .web3form-message.success {
        background: #d4edda;
        color: #155724;
        border-color: #c3e6cb;
      }
      .web3form-message.error {
        background: #f8d7da;
        color: #721c24;
        border-color: #f5c6cb;
      }
      @keyframes slideIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          const contactSection = document.querySelector('section[id="contact"]');
          if (!contactSection) return;
          let formContainer = contactSection.querySelector('[class*="bg-paper"][class*="p-8"]');
          if (!formContainer) return;
          let form = formContainer.querySelector('form');
          if (!form) {
            form = document.createElement('form');
            form.method = 'POST';
            form.action = 'https://api.web3forms.com/submit';
            const accessKeyInput = document.createElement('input');
            accessKeyInput.type = 'hidden';
            accessKeyInput.name = 'access_key';
            // المفتاح الجديد مالتك نضاف هنا
            accessKeyInput.value = '13ce3c9f-d68d-499e-8360-3bd8f987bda4';
            form.appendChild(accessKeyInput);
            const fromNameInput = document.createElement('input');
            fromNameInput.type = 'hidden';
            fromNameInput.name = 'from_name';
            fromNameInput.value = 'BERLIN Portfolio';
            form.appendChild(fromNameInput);
            formContainer.parentElement.insertBefore(form, formContainer);
          }
          form.method = 'POST';
          form.action = 'https://api.web3forms.com/submit';
          if (!form.querySelector('input[name="access_key"]')) {
            const accessKeyInput = document.createElement('input');
            accessKeyInput.type = 'hidden';
            accessKeyInput.name = 'access_key';
            // المفتاح الجديد مالتك نضاف هنا همين
            accessKeyInput.value = '13ce3c9f-d68d-499e-8360-3bd8f987bda4';
            form.appendChild(accessKeyInput);
          }
          if (!form.querySelector('input[name="from_name"]')) {
            const fromNameInput = document.createElement('input');
            fromNameInput.type = 'hidden';
            fromNameInput.name = 'from_name';
            fromNameInput.value = 'BERLIN Portfolio';
            form.appendChild(fromNameInput);
          }
          const nameInputs = formContainer.querySelectorAll('input[type="text"]');
          const emailInputs = formContainer.querySelectorAll('input[type="email"]');
          const textareas = formContainer.querySelectorAll('textarea');
          if (nameInputs.length > 0) nameInputs[0].name = 'name';
          if (emailInputs.length > 0) emailInputs[0].name = 'email';
          if (textareas.length > 0) textareas[0].name = 'message';
          const allInputs = formContainer.querySelectorAll('input, textarea');
          allInputs.forEach(input => {
            input.style.fontFamily = "'Libre Baskerville', Georgia, serif";
          });
          const submitBtn = formContainer.querySelector('button[type="submit"]');
          if (submitBtn && !submitBtn.hasAttribute('data-web3forms-enhanced')) {
            submitBtn.setAttribute('data-web3forms-enhanced', 'true');
            let messageDiv = formContainer.querySelector('.web3form-message');
            if (!messageDiv) {
              messageDiv = document.createElement('div');
              messageDiv.className = 'web3form-message';
              formContainer.appendChild(messageDiv);
            }
            form.addEventListener('submit', function(e) {
              e.preventDefault();
              const originalText = submitBtn.textContent;
              submitBtn.disabled = true;
              submitBtn.textContent = 'Sending...';
              messageDiv.classList.remove('show', 'success', 'error');
              const formData = new FormData(form);
              fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                body: formData
              })
              .then(response => response.json())
              .then(data => {
                if (data.success) {
                  messageDiv.classList.add('success', 'show');
                  messageDiv.textContent = 'Contact sent! I will get back to you soon.';
                  form.reset();
                  setTimeout(() => {
                    messageDiv.classList.remove('show');
                  }, 5000);
                } else {
                  messageDiv.classList.add('error', 'show');
                  messageDiv.textContent = 'Don\'t forget to try to fix the Lets Talk form!';
                }
              })
              .catch(error => {
                console.error('Error:', error);
                messageDiv.classList.add('error', 'show');
                messageDiv.textContent = 'Don\'t forget to try to fix the Lets Talk form!';
              })
              .finally(() => {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
              });
            });
          }
        }, 500);
      });
    </script>
</body>
</html>
